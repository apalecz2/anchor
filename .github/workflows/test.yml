name: tests

# Mirrors TEST_PLAN §10. Fast Tiers 1–3 gate every PR; the gated/slow Rust suites and
# the cross-platform build smoke run on demand (manual) so they never block the fast
# feedback loop or burn runner minutes nightly — trigger them before a release.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch: # run the gated/cross-platform checks on demand (e.g. before a release)

jobs:
  frontend:
    name: Frontend (Tiers 1–2)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run test:cov

  rust:
    name: Rust (Tier 3, non-gated)
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false # report every OS leg; don't cancel mac when win fails (or vice versa)
      matrix:
        os: [windows-latest, macos-latest]
    defaults:
      run:
        working-directory: app/src-tauri
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri
      - run: cargo fmt --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test --lib

  gated-and-e2e:
    name: Gated Rust + build smoke (manual / pre-release)
    if: github.event_name == 'workflow_dispatch'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false # report every OS leg; don't cancel mac when win fails (or vice versa)
      matrix:
        os: [windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      # Gated Rust suites (need the real pdfium archive / a tesseract on PATH).
      # extract_pdfium_flattens_library runs only when PDFIUM_TGZ points at a real
      # archive, so fetch the platform build from R2 first — otherwise the test
      # fails copying a file that was never downloaded.
      - name: Fetch pdfium archive for gated test
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            KEY=pdfium-win-x64.tgz
          else
            KEY=pdfium-mac-arm64.tgz
          fi
          curl -fsSL "https://anchor-assets.aidenpaleczny.com/binaries/$KEY" -o "$RUNNER_TEMP/pdfium.tgz"
      - name: Gated cargo tests
        working-directory: app/src-tauri
        env:
          PDFIUM_TGZ: ${{ runner.temp }}/pdfium.tgz
          TESSERACT_TEST: '1'
        run: cargo test --lib
      # Cross-platform build + bundle smoke: proves the app still compiles and packages
      # (DMG on macOS, MSI/NSIS on Windows) on a clean runner.
      - name: Build app (bundle smoke)
        run: cd app && npm ci && npm run tauri build
      # Tier 4 E2E (tauri-driver + WebdriverIO) is scaffolded in e2e/ but not yet
      # implemented. Re-enable once the wdio specs are real AND e2e/package-lock.json is
      # committed — `npm ci` requires a lockfile and will never generate one. Until then,
      # running it only produces nightly noise (see docs/store-release-plan.md Phase 4).
      # - name: Install tauri-driver
      #   run: cargo install tauri-driver --locked
      # - name: Run E2E
      #   run: cd e2e && npm ci && npm run e2e
